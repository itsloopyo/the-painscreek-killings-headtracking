name: Release
run-name: "Release ${{ github.ref_name }}"

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Create Release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v(\d+\.\d+\.\d+)$') {
            Write-Host "::error::Tag format invalid. Use semantic versioning: v1.2.3"
            exit 1
          }
          $version = $matches[1]
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version"

      - name: Validate version matches csproj
        shell: pwsh
        run: |
          Import-Module "./cameraunlock-core/powershell/ReleaseWorkflow.psm1" -Force
          $csprojVersion = Get-CsprojVersion "src/PainscreekHeadTracking/PainscreekHeadTracking.csproj"
          $tagVersion = "${{ steps.version.outputs.version }}"

          Write-Host "csproj version: $csprojVersion"
          Write-Host "Tag version: $tagVersion"

          if ($csprojVersion -ne $tagVersion) {
            Write-Host "::error::Version mismatch! Tag is v$tagVersion but csproj has $csprojVersion"
            exit 1
          }

          Write-Host "Version matches!" -ForegroundColor Green

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          # No conda dependencies: this build runs on the .NET SDK + PowerShell,
          # so the pixi environment is empty. setup-pixi's post-install
          # `pixi list` errors on an empty env; skip its install/list chain and
          # let `pixi run package` provision the env on demand.
          run-install: false

      # Build + package through the SAME command developers and the Build
      # workflow run. All build-deps come from scripts/create-unity-stubs.ps1
      # via the pixi task chain - this workflow owns no build logic.
      - name: Build and package
        shell: pwsh
        run: pixi run package

      - name: Generate release notes
        shell: pwsh
        run: |
          $artifactPaths = @(
            "src/PainscreekHeadTracking/",
            "cameraunlock-core",
            "scripts/install.cmd",
            "scripts/uninstall.cmd"
          )

          & cameraunlock-core/scripts/generate-release-notes.ps1 `
            -Version "${{ steps.version.outputs.version }}" `
            -ArtifactPaths $artifactPaths `
            -ProjectName "Head Tracking for The Painscreek Killings"

      - name: Find release ZIP
        id: find_zips
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $installerZip = "release/PainscreekHeadTracking-v$version-installer.zip"

          if (-not (Test-Path $installerZip)) {
            Write-Host "::error::Installer ZIP not found at $installerZip"
            exit 1
          }

          echo "installer_zip=$installerZip" >> $env:GITHUB_OUTPUT
          Write-Host "Found: $installerZip"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $installerZip = "${{ steps.find_zips.outputs.installer_zip }}"

          Write-Host "Creating GitHub Release for $tag..." -ForegroundColor Cyan

          gh release create $tag `
            --title "Head Tracking for The Painscreek Killings $tag" `
            --notes-file "release-notes.txt" `
            $installerZip

          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Failed to create GitHub release"
            exit 1
          }

          Write-Host "Release created successfully!" -ForegroundColor Green
